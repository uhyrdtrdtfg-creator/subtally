name: SubscribeApp
options:
  bundleIdPrefix: com.samxiao
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  developmentLanguage: zh-Hans
  xcodeVersion: "16.2"

settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: "NO"

targets:
  SubscribeApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SubscribeApp
        excludes:
          - "**/.DS_Store"
    resources:
      - path: SubscribeApp/Assets.xcassets
    dependencies:
      - target: SubscribeWidgets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.samxiao.SubscribeApp
        PRODUCT_NAME: Subtally
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_CFBundleDisplayName: "订算"
        INFOPLIST_KEY_NSUserNotificationsUsageDescription: "用于在订阅到期前发送本地提醒"
        INFOPLIST_KEY_NSSupportsLiveActivities: "YES"
        INFOPLIST_KEY_NSCameraUsageDescription: "扫描支付凭证时使用相机"
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "从相册选取支付凭证截图"
        INFOPLIST_KEY_BGTaskSchedulerPermittedIdentifiers: ["com.samxiao.SubscribeApp.refresh"]
        INFOPLIST_KEY_UIBackgroundModes: ["fetch", "processing"]
        CODE_SIGN_ENTITLEMENTS: SubscribeApp/SubscribeApp.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        SUPPORTS_MACCATALYST: "NO"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: "YES"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"

  SubscribeWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SubscribeWidgets
        excludes:
          - "**/.DS_Store"
          - "Info.plist"
      - path: SubscribeApp/Models/Subscription.swift
      - path: SubscribeApp/Models/AppGroup.swift
      - path: SubscribeApp/Models/WebhookEndpoint.swift
      - path: SubscribeApp/Models/PriceChange.swift
      - path: SubscribeApp/LiveActivity/TrialActivityAttributes.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.samxiao.SubscribeApp.Widgets
        PRODUCT_NAME: SubscribeWidgets
        INFOPLIST_FILE: SubscribeWidgets/Info.plist
        CODE_SIGN_ENTITLEMENTS: SubscribeWidgets/SubscribeWidgets.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        SUPPORTS_MACCATALYST: "NO"
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: "NO"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SKIP_INSTALL: "YES"

  SubscribeAppTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SubscribeAppTests
    dependencies:
      - target: SubscribeApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.samxiao.SubscribeApp.Tests
        GENERATE_INFOPLIST_FILE: "YES"
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Subtally.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Subtally"

schemes:
  SubscribeApp:
    build:
      targets:
        SubscribeApp: all
        SubscribeWidgets: all
        SubscribeAppTests: [test]
    test:
      gatherCoverageData: true
      targets:
        - SubscribeAppTests
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
