name: TestFlight

on:
  # 手动触发:Actions tab → TestFlight → Run workflow
  workflow_dispatch:
  # tag 触发:git tag v1.0.1 && git push --tags
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: macos-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Inject DEVELOPMENT_TEAM into project.yml
        env:
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
        run: |
          if [ -z "$DEVELOPMENT_TEAM" ]; then
            echo "::error::DEVELOPMENT_TEAM secret is missing"
            exit 1
          fi
          # Replace both occurrences of empty DEVELOPMENT_TEAM: ""
          sed -i '' "s/DEVELOPMENT_TEAM: \"\"/DEVELOPMENT_TEAM: \"$DEVELOPMENT_TEAM\"/g" project.yml
          echo "project.yml DEVELOPMENT_TEAM lines:"
          grep -n DEVELOPMENT_TEAM project.yml || true

      - name: Regenerate Xcode project
        run: xcodegen generate

      - name: Install App Store Connect API key
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
        run: |
          if [ -z "$ASC_KEY_ID" ] || [ -z "$ASC_API_KEY_P8" ]; then
            echo "::error::ASC_KEY_ID or ASC_API_KEY_P8 secret is missing"
            exit 1
          fi
          mkdir -p ~/.appstoreconnect/private_keys
          printf '%s' "$ASC_API_KEY_P8" > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8

      - name: Create .env for archive script
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          if [ -z "$ASC_ISSUER_ID" ]; then
            echo "::error::ASC_ISSUER_ID secret is missing"
            exit 1
          fi
          printf 'ASC_KEY_ID=%s\nASC_ISSUER_ID=%s\n' "$ASC_KEY_ID" "$ASC_ISSUER_ID" > .env

      - name: Archive and upload to App Store Connect
        run: ./Scripts/archive-and-upload.sh

      - name: Upload xcarchive as artifact (for dSYM / debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcarchive-${{ github.run_id }}
          path: build/*.xcarchive
          retention-days: 14
          if-no-files-found: ignore
